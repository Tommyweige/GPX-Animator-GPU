openapi: 3.0.3
info:
  title: GPX Animator POI Gateway
  version: 1.0.0
  description: >-
    Optional organisation gateway. The desktop app sends only the clicked
    coordinate and browse parameters. The gateway owns provider keys and
    upstream licensing; it must not return raw credentials.
servers:
  - url: https://gateway.example.invalid
paths:
  /v1/nearby-places:
    get:
      security:
        - bearerAuth: []
      parameters:
        - {name: lat, in: query, required: true, schema: {type: number, format: double}}
        - {name: lon, in: query, required: true, schema: {type: number, format: double}}
        - {name: radius_m, in: query, required: true, schema: {type: integer, minimum: 500, maximum: 5000}}
        - {name: limit, in: query, required: true, schema: {type: integer, minimum: 1, maximum: 20}}
        - {name: language, in: query, required: false, schema: {type: string, enum: [zh-TW, en]}}
      responses:
        '200':
          description: Provider-neutral nearby results
          content:
            application/json:
              schema:
                type: object
                required: [places]
                properties:
                  places:
                    type: array
                    items:
                      $ref: '#/components/schemas/Place'
        '401': {description: Missing/invalid bearer token}
        '429': {description: Gateway quota exceeded}
        '502': {description: Upstream provider unavailable}
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  schemas:
    Place:
      type: object
      required: [id, name, latitude, longitude]
      properties:
        id: {type: string}
        name: {type: string}
        category: {type: string, nullable: true}
        address: {type: string, nullable: true}
        latitude: {type: number, format: double}
        longitude: {type: number, format: double}
        rating: {type: number, nullable: true}
        rating_scale: {type: integer, nullable: true}
        review_count: {type: integer, nullable: true}
        popularity: {type: number, minimum: 0, maximum: 1, nullable: true}
        open_now: {type: boolean, nullable: true}
        phone: {type: string, nullable: true}
        website: {type: string, format: uri, nullable: true}
        external_url: {type: string, format: uri, nullable: true}
